name: Check Version Bump

on:
  pull_request:
    branches:
      - main

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version was bumped
        run: |
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:pyproject.toml | grep '^version' | head -1 | sed 's/version = "\(.*\)"/\1/')
          CURRENT_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Base version: $BASE_VERSION"
          echo "Current version: $CURRENT_VERSION"
          if [ "$BASE_VERSION" = "$CURRENT_VERSION" ]; then
            echo "ERROR: Version in pyproject.toml must be updated before merging to main."
            exit 1
          fi
          echo "Version was bumped from $BASE_VERSION to $CURRENT_VERSION."
